# .github/workflows/poc-diff-report.yml
# PoC: on every push and PR, extract git diff changes and produce
# a markdown report + CSV of changed files.
# Results appear in: Actions run -> Summary page, and as downloadable artifacts.

name: PoC - Diff Change Report

on:
  push:                # every commit pushed to any branch
  pull_request:        # and every PR update
  workflow_dispatch:   # manual trigger button, handy for testing

permissions:
  contents: read

jobs:
  diff-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1 || true
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "head=HEAD" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && \
               [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && \
               git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            # push event: diff everything included in this push
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            # first push of a new branch / manual run: fall back to last commit
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
            echo "head=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run diff report
        run: |
          python3 .github/scripts/diff_report.py \
            "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}"

      - name: Publish to job summary
        run: cat diff_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diff-report-${{ github.run_number }}
          path: |
            diff_report.md
            changed_files.csv
            changed_lines.csv
          retention-days: 30